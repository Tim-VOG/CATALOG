# Bloquant CI — runs on every PR and on pushes to main / the
# claude/* branches we use as long-lived deploy targets. Goals:
#
#   * Lint must pass (no errors; warnings capped at 200 for now —
#     drop the cap as we burn down legacy console.log + unused-vars).
#   * Vitest must be green.
#   * The Vite production build must succeed; no 'invalid import'
#     or 'cannot resolve' regression slips into prod.
#
# Playwright e2e runs as a separate job (longer + needs a build) so
# the fast feedback (lint + vitest) lands first.
name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same branch when a new commit lands —
# nobody wants 4 stacked CI runs spending Action minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: Lint + Vitest + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests + coverage gate
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          # Build needs a Supabase URL to evaluate the supabase client
          # module, even though no network call is made. Use a sentinel
          # so it's clear in logs this is a CI dummy, not real prod.
          VITE_SUPABASE_URL: https://ci-dummy.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-dummy-anon-key

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-test-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Build against the real Supabase URL so the bundle Playwright
      # drives can authenticate the test user. The anon key is the
      # same value shipped to every client and is safe to embed.
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: e2e
        run: npm run test:e2e
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
