<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EquipLend - Catalogue d'emprunt de matériel</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #0f1419;
      --color-bg-secondary: #1a2332;
      --color-bg-tertiary: #242f3d;
      --color-bg-card: #1e2a3a;
      --color-bg-hover: #2a3a4d;
      --color-primary: #f97316;
      --color-primary-light: #fb923c;
      --color-primary-dark: #ea580c;
      --color-accent: #06b6d4;
      --color-accent-light: #22d3ee;
      --color-success: #10b981;
      --color-warning: #f59e0b;
      --color-danger: #ef4444;
      --color-text: #f1f5f9;
      --color-text-secondary: #94a3b8;
      --color-text-muted: #64748b;
      --color-border: #334155;
      --color-border-light: #475569;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --spacing-xs: 0.25rem;
      --spacing-sm: 0.5rem;
      --spacing-md: 1rem;
      --spacing-lg: 1.5rem;
      --spacing-xl: 2rem;
      --spacing-2xl: 3rem;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
      --transition-fast: 150ms ease;
      --transition-base: 250ms ease;
      --transition-slow: 400ms ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body { font-family: var(--font-body); background: var(--color-bg); color: var(--color-text); line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    img { max-width: 100%; height: auto; display: block; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input, textarea, select { font-family: inherit; font-size: inherit; }

    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .main-content { flex: 1; display: flex; padding-top: 70px; }
    .main-content.with-sidebar { padding-left: 0; }
    .content-area { flex: 1; overflow-x: hidden; }

    .navigation { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: linear-gradient(180deg, var(--color-bg-secondary) 0%, rgba(26, 35, 50, 0.95) 100%); backdrop-filter: blur(12px); border-bottom: 1px solid var(--color-border); display: flex; align-items: center; justify-content: space-between; padding: 0 var(--spacing-xl); z-index: 1000; }
    .nav-brand { display: flex; align-items: center; gap: var(--spacing-sm); font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--color-primary); }
    .nav-links { display: flex; align-items: center; gap: var(--spacing-sm); }
    .nav-link { display: flex; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-sm) var(--spacing-md); border-radius: var(--radius-md); font-weight: 500; color: var(--color-text-secondary); transition: all var(--transition-fast); position: relative; }
    .nav-link:hover { color: var(--color-text); background: var(--color-bg-hover); }
    .nav-link.active { color: var(--color-primary); background: rgba(249, 115, 22, 0.1); }
    .nav-link.admin { color: var(--color-accent); }
    .nav-link.admin.active { background: rgba(6, 182, 212, 0.1); }
    .nav-divider { width: 1px; height: 24px; background: var(--color-border); margin: 0 var(--spacing-sm); }
    .cart-badge { position: absolute; top: -4px; right: -4px; background: var(--color-primary); color: white; font-size: 0.7rem; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; }

    .admin-sidebar { width: 260px; min-height: calc(100vh - 70px); background: var(--color-bg-secondary); border-right: 1px solid var(--color-border); padding: var(--spacing-lg); display: flex; flex-direction: column; position: sticky; top: 70px; }
    .sidebar-header { display: flex; align-items: center; gap: var(--spacing-sm); font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; color: var(--color-accent); padding-bottom: var(--spacing-lg); border-bottom: 1px solid var(--color-border); margin-bottom: var(--spacing-lg); }
    .sidebar-nav { display: flex; flex-direction: column; gap: var(--spacing-xs); flex: 1; }
    .sidebar-link { display: flex; align-items: center; gap: var(--spacing-md); padding: var(--spacing-md); border-radius: var(--radius-md); font-weight: 500; color: var(--color-text-secondary); transition: all var(--transition-fast); }
    .sidebar-link:hover { color: var(--color-text); background: var(--color-bg-hover); }
    .sidebar-link.active { color: var(--color-accent); background: rgba(6, 182, 212, 0.1); }
    .pending-badge { margin-left: auto; background: var(--color-danger); color: white; font-size: 0.75rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .sidebar-back { display: flex; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-md); color: var(--color-text-muted); border-top: 1px solid var(--color-border); margin-top: var(--spacing-lg); transition: color var(--transition-fast); }
    .sidebar-back:hover { color: var(--color-text); }

    .catalog-view { padding: var(--spacing-xl); max-width: 1400px; margin: 0 auto; }
    .catalog-header { margin-bottom: var(--spacing-xl); }
    .catalog-header h1 { font-family: var(--font-display); font-size: 2.5rem; font-weight: 700; margin-bottom: var(--spacing-sm); background: linear-gradient(135deg, var(--color-text) 0%, var(--color-text-secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .catalog-header p { color: var(--color-text-secondary); font-size: 1.1rem; }
    .catalog-filters { display: flex; flex-wrap: wrap; gap: var(--spacing-md); margin-bottom: var(--spacing-xl); align-items: center; }
    .search-box { display: flex; align-items: center; gap: var(--spacing-sm); background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--spacing-sm) var(--spacing-md); flex: 1; min-width: 250px; max-width: 400px; }
    .search-box svg { color: var(--color-text-muted); }
    .search-box input { flex: 1; background: none; border: none; color: var(--color-text); outline: none; }
    .search-box input::placeholder { color: var(--color-text-muted); }
    .category-filters { display: flex; flex-wrap: wrap; gap: var(--spacing-sm); }
    .category-btn { padding: var(--spacing-sm) var(--spacing-md); border-radius: var(--radius-md); font-weight: 500; font-size: 0.9rem; color: var(--color-text-secondary); background: var(--color-bg-secondary); border: 1px solid var(--color-border); transition: all var(--transition-fast); }
    .category-btn:hover { border-color: var(--color-border-light); color: var(--color-text); }
    .category-btn.active { background: var(--color-primary); border-color: var(--color-primary); color: white; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--spacing-lg); }

    .product-card { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; transition: all var(--transition-base); }
    .product-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--color-border-light); }
    .product-card.unavailable { opacity: 0.7; }
    .product-card.unavailable:hover { transform: none; }
    .product-image { position: relative; height: 180px; overflow: hidden; }
    .product-image img { width: 100%; height: 100%; object-fit: cover; transition: transform var(--transition-slow); }
    .product-card:hover .product-image img { transform: scale(1.05); }
    .product-category { position: absolute; top: var(--spacing-sm); left: var(--spacing-sm); padding: 4px 10px; border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 600; color: white; text-transform: uppercase; letter-spacing: 0.5px; }
    .in-cart-badge { position: absolute; top: var(--spacing-sm); right: var(--spacing-sm); padding: 4px 10px; border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 600; color: white; background: var(--color-success); }
    .product-info { padding: var(--spacing-md); }
    .product-info h3 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; margin-bottom: var(--spacing-xs); }
    .product-description { color: var(--color-text-secondary); font-size: 0.9rem; margin-bottom: var(--spacing-md); }
    .stock-info { display: flex; align-items: center; gap: var(--spacing-sm); margin-bottom: var(--spacing-md); }
    .stock-indicator { display: flex; align-items: center; gap: var(--spacing-xs); font-size: 0.85rem; font-weight: 500; }
    .stock-dot { width: 8px; height: 8px; border-radius: 50%; }
    .stock-indicator.available .stock-dot { background: var(--color-success); box-shadow: 0 0 8px var(--color-success); }
    .stock-indicator.available { color: var(--color-success); }
    .stock-indicator.unavailable .stock-dot { background: var(--color-danger); }
    .stock-indicator.unavailable { color: var(--color-danger); }
    .total-stock { color: var(--color-text-muted); font-size: 0.8rem; }
    .product-actions { display: flex; gap: var(--spacing-sm); align-items: center; }
    .quantity-selector { display: flex; align-items: center; background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: var(--radius-sm); overflow: hidden; }
    .quantity-selector button { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--color-text-secondary); transition: all var(--transition-fast); }
    .quantity-selector button:hover:not(:disabled) { background: var(--color-bg-hover); color: var(--color-text); }
    .quantity-selector button:disabled { opacity: 0.3; cursor: not-allowed; }
    .quantity-selector span { width: 36px; text-align: center; font-weight: 600; }
    .add-to-cart-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: var(--spacing-xs); padding: var(--spacing-sm) var(--spacing-md); background: var(--color-primary); color: white; font-weight: 600; border-radius: var(--radius-sm); transition: all var(--transition-fast); }
    .add-to-cart-btn:hover { background: var(--color-primary-dark); }

    .cart-view { padding: var(--spacing-xl); max-width: 1200px; margin: 0 auto; }
    .cart-view.empty { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 150px); }
    .empty-cart { text-align: center; color: var(--color-text-muted); }
    .empty-cart svg { margin-bottom: var(--spacing-lg); opacity: 0.3; }
    .empty-cart h2 { font-family: var(--font-display); font-size: 1.5rem; color: var(--color-text-secondary); margin-bottom: var(--spacing-sm); }
    .cart-header { margin-bottom: var(--spacing-xl); }
    .cart-header h1 { font-family: var(--font-display); font-size: 2rem; margin-bottom: var(--spacing-xs); }
    .cart-header p { color: var(--color-text-secondary); }
    .cart-content { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-xl); }
    .cart-items-section h2, .form-section h2 { display: flex; align-items: center; gap: var(--spacing-sm); font-family: var(--font-display); font-size: 1.2rem; margin-bottom: var(--spacing-md); color: var(--color-text); }
    .cart-items { display: flex; flex-direction: column; gap: var(--spacing-md); }
    .cart-item { display: flex; align-items: center; gap: var(--spacing-md); padding: var(--spacing-md); background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-md); transition: border-color var(--transition-fast); }
    .cart-item.has-warning { border-color: var(--color-warning); }
    .cart-item img { width: 60px; height: 60px; border-radius: var(--radius-sm); object-fit: cover; }
    .cart-item-info { flex: 1; }
    .cart-item-info h4 { font-weight: 600; margin-bottom: 2px; }
    .cart-item-category { font-size: 0.8rem; color: var(--color-text-muted); }
    .availability-warning { display: flex; align-items: center; gap: var(--spacing-xs); margin-top: var(--spacing-xs); font-size: 0.8rem; color: var(--color-warning); }
    .cart-item-quantity { display: flex; align-items: center; background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: var(--radius-sm); overflow: hidden; }
    .cart-item-quantity button { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: var(--color-text-secondary); transition: all var(--transition-fast); }
    .cart-item-quantity button:hover { background: var(--color-bg-hover); color: var(--color-text); }
    .cart-item-quantity span { width: 32px; text-align: center; font-weight: 600; }
    .remove-btn { color: var(--color-text-muted); padding: var(--spacing-sm); border-radius: var(--radius-sm); transition: all var(--transition-fast); }
    .remove-btn:hover { color: var(--color-danger); background: rgba(239, 68, 68, 0.1); }

    .booking-form { display: flex; flex-direction: column; gap: var(--spacing-xl); }
    .form-section { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--spacing-lg); }
    .date-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-md); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-md); }
    .form-group { display: flex; flex-direction: column; gap: var(--spacing-xs); margin-bottom: var(--spacing-md); }
    .form-group:last-child { margin-bottom: 0; }
    .form-group label { font-size: 0.9rem; font-weight: 500; color: var(--color-text-secondary); }
    .form-group input, .form-group textarea { padding: var(--spacing-sm) var(--spacing-md); background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: var(--radius-sm); color: var(--color-text); transition: border-color var(--transition-fast); }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--color-primary); }
    .form-group input:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .submit-btn { display: flex; align-items: center; justify-content: center; gap: var(--spacing-sm); width: 100%; padding: var(--spacing-md) var(--spacing-xl); background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%); color: white; font-size: 1rem; font-weight: 600; border-radius: var(--radius-md); transition: all var(--transition-fast); }
    .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(249, 115, 22, 0.4); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: var(--spacing-lg); }
    .modal { background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--spacing-xl); max-width: 500px; width: 100%; animation: modalIn 0.3s ease; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal h3 { font-family: var(--font-display); font-size: 1.3rem; margin-bottom: var(--spacing-lg); }
    .confirmation-summary { background: var(--color-bg-tertiary); border-radius: var(--radius-md); padding: var(--spacing-md); margin-bottom: var(--spacing-md); }
    .confirmation-summary p { margin-bottom: var(--spacing-xs); font-size: 0.95rem; }
    .confirmation-summary p:last-child { margin-bottom: 0; }
    .confirmation-note { display: flex; align-items: center; gap: var(--spacing-sm); font-size: 0.9rem; color: var(--color-text-secondary); margin-bottom: var(--spacing-lg); }
    .modal-actions { display: flex; gap: var(--spacing-md); justify-content: flex-end; }
    .btn-secondary { padding: var(--spacing-sm) var(--spacing-lg); background: var(--color-bg-tertiary); border: 1px solid var(--color-border); color: var(--color-text); font-weight: 500; border-radius: var(--radius-sm); transition: all var(--transition-fast); }
    .btn-secondary:hover { background: var(--color-bg-hover); }
    .btn-primary { padding: var(--spacing-sm) var(--spacing-lg); background: var(--color-primary); color: white; font-weight: 600; border-radius: var(--radius-sm); transition: all var(--transition-fast); }
    .btn-primary:hover { background: var(--color-primary-dark); }

    .admin-products-view, .admin-calendar-view, .admin-requests-view { padding: var(--spacing-xl); max-width: 1600px; margin: 0 auto; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; gap: var(--spacing-lg); margin-bottom: var(--spacing-xl); flex-wrap: wrap; }
    .admin-header h1 { font-family: var(--font-display); font-size: 1.8rem; }
    .admin-search { display: flex; align-items: center; gap: var(--spacing-sm); background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--spacing-sm) var(--spacing-md); min-width: 250px; }
    .admin-search svg { color: var(--color-text-muted); }
    .admin-search input { flex: 1; background: none; border: none; color: var(--color-text); outline: none; }

    .admin-products-table { overflow-x: auto; }
    .admin-products-table table { width: 100%; border-collapse: collapse; background: var(--color-bg-card); border-radius: var(--radius-lg); overflow: hidden; }
    .admin-products-table th, .admin-products-table td { padding: var(--spacing-md); text-align: left; border-bottom: 1px solid var(--color-border); }
    .admin-products-table th { background: var(--color-bg-secondary); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--color-text-secondary); }
    .admin-products-table tr:last-child td { border-bottom: none; }
    .admin-products-table tr:hover td { background: var(--color-bg-hover); }
    .product-cell { display: flex; align-items: center; gap: var(--spacing-md); }
    .product-cell img { width: 48px; height: 48px; border-radius: var(--radius-sm); object-fit: cover; }
    .product-cell .product-name { display: block; font-weight: 600; }
    .product-cell .product-desc { display: block; font-size: 0.8rem; color: var(--color-text-muted); }
    .category-tag { display: inline-block; padding: 4px 10px; border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 600; color: white; text-transform: uppercase; }
    .stock-cell, .borrowed-cell, .pending-cell, .available-cell { font-weight: 600; font-size: 1rem; }
    .borrowed-cell { color: var(--color-warning); }
    .pending-cell { color: var(--color-accent); }
    .available-cell .positive { color: var(--color-success); }
    .available-cell .zero { color: var(--color-danger); }
    .borrowers-list { display: flex; flex-direction: column; gap: var(--spacing-xs); }
    .borrower-tag { display: flex; align-items: center; gap: var(--spacing-sm); padding: 4px 8px; background: var(--color-bg-secondary); border-radius: var(--radius-sm); font-size: 0.8rem; }
    .borrower-tag .borrower-name { font-weight: 500; }
    .borrower-tag .loan-dates { color: var(--color-text-muted); }
    .borrower-tag .loan-qty { color: var(--color-primary); font-weight: 600; }
    .no-borrower { color: var(--color-text-muted); }

    .calendar-nav { display: flex; align-items: center; gap: var(--spacing-md); }
    .calendar-nav button { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: var(--radius-sm); color: var(--color-text-secondary); transition: all var(--transition-fast); }
    .calendar-nav button:hover { background: var(--color-bg-hover); color: var(--color-text); }
    .date-range { font-weight: 500; color: var(--color-text-secondary); min-width: 200px; text-align: center; }
    .calendar-container { overflow-x: auto; margin-bottom: var(--spacing-lg); }
    .calendar-grid { min-width: 900px; background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; }
    .calendar-header { display: grid; grid-template-columns: 200px repeat(14, 1fr); background: var(--color-bg-secondary); border-bottom: 1px solid var(--color-border); }
    .calendar-product-header { padding: var(--spacing-md); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--color-text-secondary); }
    .calendar-date-header { padding: var(--spacing-sm); text-align: center; border-left: 1px solid var(--color-border); }
    .calendar-date-header.today { background: rgba(249, 115, 22, 0.1); }
    .calendar-date-header .day-name { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--color-text-muted); }
    .calendar-date-header .day-number { display: block; font-weight: 600; font-size: 1rem; }
    .calendar-body { display: flex; flex-direction: column; }
    .calendar-row { display: grid; grid-template-columns: 200px repeat(14, 1fr); border-bottom: 1px solid var(--color-border); }
    .calendar-row:last-child { border-bottom: none; }
    .calendar-product-cell { display: flex; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-sm) var(--spacing-md); background: var(--color-bg-tertiary); }
    .calendar-product-cell img { width: 40px; height: 40px; border-radius: var(--radius-sm); object-fit: cover; }
    .calendar-product-cell .product-name { display: block; font-weight: 500; font-size: 0.9rem; }
    .calendar-product-cell .product-stock { display: block; font-size: 0.75rem; color: var(--color-text-muted); }
    .calendar-cell { padding: var(--spacing-xs); border-left: 1px solid var(--color-border); min-height: 60px; display: flex; flex-direction: column; gap: 2px; }
    .calendar-cell.today { background: rgba(249, 115, 22, 0.05); }
    .loan-indicator { display: flex; align-items: center; justify-content: space-between; padding: 3px 6px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; transition: transform var(--transition-fast); }
    .loan-indicator:hover { transform: scale(1.05); }
    .loan-indicator.active { background: var(--color-primary); color: white; }
    .loan-indicator.pending { background: var(--color-accent); color: white; }
    .loan-indicator .loan-borrower { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60px; }
    .loan-indicator .loan-qty { font-weight: 700; }
    .calendar-legend { display: flex; gap: var(--spacing-lg); justify-content: center; }
    .legend-item { display: flex; align-items: center; gap: var(--spacing-sm); font-size: 0.85rem; color: var(--color-text-secondary); }

    // Data

      { id: 1, name: "Caméra Sony A7IV", category: "Vidéo", image: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=200&h=200&fit=crop", totalStock: 5, description: "Caméra professionnelle 4K" },
      { id: 2, name: "Trépied Manfrotto", category: "Support", image: "https://images.unsplash.com/photo-1617575521317-d2974f3b56d2?w=200&h=200&fit=crop", totalStock: 10, description: "Trépied professionnel aluminium" },
      { id: 3, name: "Micro Rode NTG5", category: "Audio", image: "https://images.unsplash.com/photo-1590602847861-f357a9332bbc?w=200&h=200&fit=crop", totalStock: 8, description: "Micro shotgun broadcast" },
      { id: 4, name: "Éclairage LED Aputure", category: "Éclairage", image: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=200&h=200&fit=crop", totalStock: 12, description: "Panel LED bicolore 600D" },

      { id: 6, name: "Objectif 24-70mm f/2.8", category: "Optique", image: "https://images.unsplash.com/photo-1617005082133-548c4dd27f35?w=200&h=200&fit=crop", totalStock: 6, description: "Objectif zoom standard" },

      { id: 2, productId: 3, quantity: 3, borrowerName: "Jean Martin", borrowerEmail: "jean.martin@email.com", borrowerPhone: "0698765432", pickupDate: "2026-01-07", returnDate: "2026-01-12", status: "active", notes: "Enregistrement podcast" },
      { id: 3, productId: 5, quantity: 1, borrowerName: "Sophie Bernard", borrowerEmail: "sophie.b@email.com", borrowerPhone: "0654321987", pickupDate: "2026-01-08", returnDate: "2026-01-09", status: "pending", notes: "Prise de vue aérienne" },
      { id: 4, productId: 4, quantity: 4, borrowerName: "Pierre Leroy", borrowerEmail: "p.leroy@email.com", borrowerPhone: "0678901234", pickupDate: "2026-01-10", returnDate: "2026-01-15", status: "pending", notes: "Studio photo" }
    ];

    const categories = ["Tous", "Vidéo", "Audio", "Éclairage", "Support", "Drone", "Optique"];

    // Utilities
    const formatDate = (dateStr) => new Date(dateStr).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
    const formatDateShort = (dateStr) => new Date(dateStr).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
    const getDateRange = (startDate, days) => {
      const dates = [];
      const start = new Date(startDate);
      for (let i = 0; i < days; i++) {
        const date = new Date(start);
        date.setDate(start.getDate() + i);
        dates.push(date.toISOString().split('T')[0]);
      }
      return dates;
    };
    const isDateInRange = (date, startDate, endDate) => date >= startDate && date <= endDate;
    const getCategoryColor = (category) => {
      const colors = { "Vidéo": "#ef4444", "Audio": "#8b5cf6", "Éclairage": "#f59e0b", "Support": "#10b981", "Drone": "#06b6d4", "Optique": "#ec4899" };
      return colors[category] || "#6b7280";
    };

    // Toast Component
    const Toast = ({ message, type, onClose }) => {

      return (

    // Navigation
    const Navigation = ({ view, setView, cartCount }) => (

      const getAvailableStock = (productId) => {
        const product = products.find(p => p.id === productId);
        const activeLoans = loans.filter(l => l.productId === productId && (l.status === 'active' || l.status === 'pending'));
        const borrowedQuantity = activeLoans.reduce((sum, l) => sum + l.quantity, 0);
        const inCartQuantity = cart.find(c => c.product.id === productId)?.quantity || 0;
        return product.totalStock - borrowedQuantity - inCartQuantity;
      };

      const filteredProducts = products.filter(product => {
        const matchesSearch = product.name.toLowerCase().includes(searchTerm.toLowerCase()) || product.description.toLowerCase().includes(searchTerm.toLowerCase());

    const CartView = ({ cart, updateCartItem, removeFromCart, onSubmitRequest, products, loans }) => {
      const [pickupDate, setPickupDate] = useState('');
      const [returnDate, setReturnDate] = useState('');
      const [formData, setFormData] = useState({ firstName: '', lastName: '', email: '', phone: '', organization: '', notes: '' });

      const [availabilityWarnings, setAvailabilityWarnings] = useState([]);
      const today = new Date().toISOString().split('T')[0];

      useEffect(() => {
        if (pickupDate && returnDate && cart.length > 0) {
          const warnings = [];
          cart.forEach(item => {
            const conflictingLoans = loans.filter(loan => loan.productId === item.product.id && (loan.status === 'active' || loan.status === 'pending') && !(returnDate < loan.pickupDate || pickupDate > loan.returnDate));
            const borrowedDuringPeriod = conflictingLoans.reduce((sum, l) => sum + l.quantity, 0);
            const availableDuringPeriod = item.product.totalStock - borrowedDuringPeriod;
            if (item.quantity > availableDuringPeriod) {
              warnings.push({ productId: item.product.id, productName: item.product.name, requested: item.quantity, available: availableDuringPeriod });

          });
          setAvailabilityWarnings(warnings);
        }
      }, [pickupDate, returnDate, cart, loans]);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (availabilityWarnings.length > 0) { alert('Veuillez ajuster les quantités selon les disponibilités'); return; }
        setShowConfirmation(true);
      };

      const confirmSubmit = () => {
        onSubmitRequest({ items: cart, pickupDate, returnDate, ...formData });
        setShowConfirmation(false);
      };

      if (cart.length === 0) {
        return (
          <div className="cart-view empty">
            <div className="empty-cart">
              <Icon name="cart" size={64} />
              <h2>Votre panier est vide</h2>
              <p>Ajoutez des équipements depuis le catalogue pour commencer votre demande d'emprunt.</p>
            </div>
          </div>
        );
      }

      return (
        <div className="cart-view">
          <header className="cart-header">
            <h1>Récapitulatif de la demande</h1>
            <p>Vérifiez votre sélection et complétez vos informations</p>
          </header>
          <div className="cart-content">
            <div className="cart-items-section">
              <h2><Icon name="package" size={20} /> Équipements sélectionnés</h2>
              <div className="cart-items">
                {cart.map(item => {
                  const warning = availabilityWarnings.find(w => w.productId === item.product.id);
                  return (
                    <div key={item.product.id} className={`cart-item ${warning ? 'has-warning' : ''}`}>
                      <img src={item.product.image} alt={item.product.name} />
                      <div className="cart-item-info">
                        <h4>{item.product.name}</h4>
                        <span className="cart-item-category">{item.product.category}</span>
                        {warning && <div className="availability-warning"><Icon name="alert" size={14} /><span>Seulement {warning.available} disponible(s)</span></div>}
                      </div>
                      <div className="cart-item-quantity">
                        <button onClick={() => updateCartItem(item.product.id, item.quantity - 1)}><Icon name="minus" size={14} /></button>
                        <span>{item.quantity}</span>
                        <button onClick={() => updateCartItem(item.product.id, item.quantity + 1)}><Icon name="plus" size={14} /></button>
                      </div>
                      <button className="remove-btn" onClick={() => removeFromCart(item.product.id)}><Icon name="trash" size={18} /></button>
                    </div>
                  );
                })}
              </div>
            </div>
            <form className="booking-form" onSubmit={handleSubmit}>
              <div className="form-section">
                <h2><Icon name="calendar" size={20} /> Dates d'emprunt</h2>
                <div className="date-inputs">
                  <div className="form-group">
                    <label>Date de retrait (pickup)</label>
                    <input type="date" value={pickupDate} min={today} onChange={(e) => { setPickupDate(e.target.value); if (returnDate && e.target.value > returnDate) setReturnDate(''); }} required />
                  </div>
                  <div className="form-group">
                    <label>Date de retour (deposit)</label>
                    <input type="date" value={returnDate} min={pickupDate || today} onChange={(e) => setReturnDate(e.target.value)} required disabled={!pickupDate} />
                  </div>
                </div>
              </div>
              <div className="form-section">
                <h2><Icon name="users" size={20} /> Vos informations</h2>
                <div className="form-row">
                  <div className="form-group"><label>Prénom *</label><input type="text" value={formData.firstName} onChange={(e) => setFormData({...formData, firstName: e.target.value})} required /></div>
                  <div className="form-group"><label>Nom *</label><input type="text" value={formData.lastName} onChange={(e) => setFormData({...formData, lastName: e.target.value})} required /></div>
                </div>
                <div className="form-row">
                  <div className="form-group"><label>Email *</label><input type="email" value={formData.email} onChange={(e) => setFormData({...formData, email: e.target.value})} required /></div>
                  <div className="form-group"><label>Téléphone *</label><input type="tel" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} required /></div>
                </div>
                <div className="form-group"><label>Organisation / Société</label><input type="text" value={formData.organization} onChange={(e) => setFormData({...formData, organization: e.target.value})} /></div>
                <div className="form-group"><label>Notes / Commentaires</label><textarea value={formData.notes} onChange={(e) => setFormData({...formData, notes: e.target.value})} placeholder="Précisez le contexte de votre emprunt..." rows={3} /></div>
              </div>
              <button type="submit" className="submit-btn" disabled={availabilityWarnings.length > 0}>
                <Icon name="send" size={18} />Envoyer la demande d'emprunt
              </button>
            </form>
          </div>
          {showConfirmation && (
            <div className="modal-overlay">
              <div className="modal confirmation-modal">
                <h3>Confirmer la demande</h3>
                <div className="confirmation-summary">
                  <p><strong>Équipements :</strong> {cart.length} article(s)</p>
                  <p><strong>Période :</strong> {formatDate(pickupDate)} → {formatDate(returnDate)}</p>
                  <p><strong>Demandeur :</strong> {formData.firstName} {formData.lastName}</p>
                  <p><strong>Contact :</strong> {formData.email}</p>
                </div>
                <p className="confirmation-note"><Icon name="mail" size={16} />Un email de confirmation sera envoyé à votre adresse ainsi qu'à l'administrateur.</p>
                <div className="modal-actions">
                  <button className="btn-secondary" onClick={() => setShowConfirmation(false)}>Annuler</button>
                  <button className="btn-primary" onClick={confirmSubmit}>Confirmer l'envoi</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // Admin Products View
    const AdminProductsView = ({ products, loans }) => {
      const [searchTerm, setSearchTerm] = useState('');

      const getProductStats = (productId) => {
        const product = products.find(p => p.id === productId);
        const activeLoans = loans.filter(l => l.productId === productId && l.status === 'active');
        const pendingLoans = loans.filter(l => l.productId === productId && l.status === 'pending');
        const borrowedQuantity = activeLoans.reduce((sum, l) => sum + l.quantity, 0);
        const pendingQuantity = pendingLoans.reduce((sum, l) => sum + l.quantity, 0);
        return { total: product.totalStock, borrowed: borrowedQuantity, pending: pendingQuantity, available: product.totalStock - borrowedQuantity, activeLoans, pendingLoans };
      };

      const filteredProducts = products.filter(product => product.name.toLowerCase().includes(searchTerm.toLowerCase()));

      return (
        <div className="admin-products-view">
          <header className="admin-header">
            <h1>Gestion des produits</h1>
            <div className="admin-search">
              <Icon name="search" size={18} />
              <input type="text" placeholder="Rechercher un produit..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
            </div>
          </header>
          <div className="admin-products-table">
            <table>
              <thead>
                <tr><th>Produit</th><th>Catégorie</th><th>Stock total</th><th>Emprunté</th><th>En attente</th><th>Disponible</th><th>Emprunteurs actuels</th></tr>
              </thead>
              <tbody>
                {filteredProducts.map(product => {
                  const stats = getProductStats(product.id);
                  return (
                    <tr key={product.id}>
                      <td className="product-cell">
                        <img src={product.image} alt={product.name} />
                        <div><span className="product-name">{product.name}</span><span className="product-desc">{product.description}</span></div>
                      </td>
                      <td><span className="category-tag" style={{ backgroundColor: getCategoryColor(product.category) }}>{product.category}</span></td>
                      <td className="stock-cell">{stats.total}</td>
                      <td className="borrowed-cell">{stats.borrowed}</td>
                      <td className="pending-cell">{stats.pending}</td>
                      <td className="available-cell"><span className={stats.available > 0 ? 'positive' : 'zero'}>{stats.available}</span></td>
                      <td className="borrowers-cell">
                        {stats.activeLoans.length > 0 ? (
                          <div className="borrowers-list">
                            {stats.activeLoans.map(loan => (
                              <div key={loan.id} className="borrower-tag">
                                <span className="borrower-name">{loan.borrowerName}</span>
                                <span className="loan-dates">{formatDateShort(loan.pickupDate)} → {formatDateShort(loan.returnDate)}</span>
                                <span className="loan-qty">×{loan.quantity}</span>
                              </div>
                            ))}
                          </div>
                        ) : <span className="no-borrower">-</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // Admin Calendar View
    const AdminCalendarView = ({ products, loans }) => {
      const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
      const daysToShow = 14;
      const dates = getDateRange(startDate, daysToShow);

      const navigateDays = (direction) => {
        const current = new Date(startDate);
        current.setDate(current.getDate() + (direction * 7));
        setStartDate(current.toISOString().split('T')[0]);
      };

      const getLoanForCell = (productId, date) => loans.filter(loan => loan.productId === productId && isDateInRange(date, loan.pickupDate, loan.returnDate));
      const isToday = (date) => date === new Date().toISOString().split('T')[0];

      return (
        <div className="admin-calendar-view">
          <header className="admin-header">
            <h1>Vue calendrier</h1>
            <div className="calendar-nav">
              <button onClick={() => navigateDays(-1)}><Icon name="chevronLeft" size={20} /></button>
              <span className="date-range">{formatDate(dates[0])} - {formatDate(dates[dates.length - 1])}</span>
              <button onClick={() => navigateDays(1)}><Icon name="chevronRight" size={20} /></button>
            </div>
          </header>
          <div className="calendar-container">
            <div className="calendar-grid">
              <div className="calendar-header">
                <div className="calendar-product-header">Produit</div>
                {dates.map(date => (
                  <div key={date} className={`calendar-date-header ${isToday(date) ? 'today' : ''}`}>
                    <span className="day-name">{new Date(date).toLocaleDateString('fr-FR', { weekday: 'short' })}</span>
                    <span className="day-number">{new Date(date).getDate()}</span>
                  </div>
                ))}
              </div>
              <div className="calendar-body">
                {products.map(product => (
                  <div key={product.id} className="calendar-row">
                    <div className="calendar-product-cell">
                      <img src={product.image} alt={product.name} />
                      <div><span className="product-name">{product.name}</span><span className="product-stock">Stock: {product.totalStock}</span></div>
                    </div>
                    {dates.map(date => {
                      const cellLoans = getLoanForCell(product.id, date);
                      return (
                        <div key={date} className={`calendar-cell ${isToday(date) ? 'today' : ''} ${cellLoans.length > 0 ? 'has-loan' : ''}`}>
                          {cellLoans.map(loan => (
                            <div key={loan.id} className={`loan-indicator ${loan.status}`} title={`${loan.borrowerName} - ${loan.quantity} unité(s)`}>
                              <span className="loan-borrower">{loan.borrowerName.split(' ')[0]}</span>
                              <span className="loan-qty">×{loan.quantity}</span>
                            </div>
                          ))}
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div className="calendar-legend">
            <div className="legend-item"><span className="legend-color active"></span><span>Emprunt actif</span></div>
            <div className="legend-item"><span className="legend-color pending"></span><span>En attente de validation</span></div>
          </div>
        </div>
      );
    };

    // Admin Requests View
    const AdminRequestsView = ({ loans, products, onUpdateLoanStatus }) => {
      const pendingLoans = loans.filter(l => l.status === 'pending');
      const getProduct = (productId) => products.find(p => p.id === productId);

      return (
        <div className="admin-requests-view">
          <header className="admin-header">
            <h1>Demandes d'emprunt</h1>
            <span className="pending-count">{pendingLoans.length} en attente</span>
          </header>
          {pendingLoans.length === 0 ? (
            <div className="no-requests">
              <Icon name="check" size={48} />
              <h3>Aucune demande en attente</h3>
              <p>Toutes les demandes ont été traitées</p>
            </div>
          ) : (
            <div className="requests-list">
              {pendingLoans.map(loan => {
                const product = getProduct(loan.productId);
                return (
                  <div key={loan.id} className="request-card">
                    <div className="request-product">
                      <img src={product.image} alt={product.name} />
                      <div><h4>{product.name}</h4><span className="request-quantity">Quantité: {loan.quantity}</span></div>
                    </div>
                    <div className="request-details">
                      <div className="request-borrower">
                        <Icon name="users" size={16} />
                        <div>
                          <span className="borrower-name">{loan.borrowerName}</span>
                          <span className="borrower-email">{loan.borrowerEmail}</span>
                          <span className="borrower-phone">{loan.borrowerPhone}</span>
                        </div>
                      </div>
                      <div className="request-dates">
                        <Icon name="calendar" size={16} />
                        <div><span>Retrait: {formatDate(loan.pickupDate)}</span><span>Retour: {formatDate(loan.returnDate)}</span></div>
                      </div>
                      {loan.notes && <div className="request-notes"><span className="notes-label">Notes:</span><span>{loan.notes}</span></div>}
                    </div>
                    <div className="request-actions">
                      <button className="btn-approve" onClick={() => onUpdateLoanStatus(loan.id, 'active')}><Icon name="check" size={18} />Approuver</button>
                      <button className="btn-reject" onClick={() => onUpdateLoanStatus(loan.id, 'rejected')}><Icon name="x" size={18} />Refuser</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    // Main App
    function App() {
      const [view, setView] = useState('catalog');
      const [products] = useState(initialProducts);
      const [loans, setLoans] = useState(initialLoans);
      const [cart, setCart] = useState([]);
      const [toast, setToast] = useState(null);

      const pendingCount = loans.filter(l => l.status === 'pending').length;
      const showToast = (message, type = 'success') => setToast({ message, type });

      const addToCart = (product, quantity) => {
        const existingIndex = cart.findIndex(c => c.product.id === product.id);
        if (existingIndex >= 0) {
          const newCart = [...cart];
          newCart[existingIndex].quantity += quantity;
          setCart(newCart);
        } else {
          setCart([...cart, { product, quantity }]);
        }
        showToast(`${product.name} ajouté au panier`);
      };

      const updateCartItem = (productId, quantity) => {
        if (quantity <= 0) removeFromCart(productId);
        else setCart(cart.map(item => item.product.id === productId ? { ...item, quantity } : item));
      };

      const removeFromCart = (productId) => setCart(cart.filter(c => c.product.id !== productId));

      const submitRequest = (requestData) => {
        const newLoans = requestData.items.map((item, index) => ({
          id: Date.now() + index,
          productId: item.product.id,
          quantity: item.quantity,
          borrowerName: `${requestData.firstName} ${requestData.lastName}`,
          borrowerEmail: requestData.email,
          borrowerPhone: requestData.phone,
          pickupDate: requestData.pickupDate,
          returnDate: requestData.returnDate,
          status: 'pending',
          notes: requestData.notes
        }));
        setLoans([...loans, ...newLoans]);
        setCart([]);
        setView('catalog');
        showToast('Demande envoyée avec succès ! Un email de confirmation a été envoyé.');
      };

      const updateLoanStatus = (loanId, status) => {
        setLoans(loans.map(loan => loan.id === loanId ? { ...loan, status } : loan));
        showToast(status === 'active' ? 'Demande approuvée' : 'Demande refusée');
      };

      return (
        <div className="app">
          <Navigation view={view} setView={setView} cartCount={cart.length} />
          <main className={`main-content ${view.startsWith('admin') ? 'with-sidebar' : ''}`}>
            {view.startsWith('admin') && <AdminSidebar view={view} setView={setView} pendingCount={pendingCount} />}
            <div className="content-area">
              {view === 'catalog' && <CatalogView products={products} loans={loans} cart={cart} onAddToCart={addToCart} />}
              {view === 'cart' && <CartView cart={cart} products={products} loans={loans} updateCartItem={updateCartItem} removeFromCart={removeFromCart} onSubmitRequest={submitRequest} />}
              {view === 'admin-products' && <AdminProductsView products={products} loans={loans} />}
              {view === 'admin-calendar' && <AdminCalendarView products={products} loans={loans} />}
              {view === 'admin-requests' && <AdminRequestsView loans={loans} products={products} onUpdateLoanStatus={updateLoanStatus} />}
            </div>
          </main>
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
