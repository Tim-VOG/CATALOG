<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EquipLend - Catalogue d'emprunt de matériel</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #0f1419;
      --color-bg-secondary: #1a2332;
      --color-bg-tertiary: #242f3d;
      --color-bg-card: #1e2a3a;
      --color-bg-hover: #2a3a4d;
      --color-primary: #f97316;
      --color-primary-light: #fb923c;
      --color-primary-dark: #ea580c;
      --color-accent: #06b6d4;
      --color-accent-light: #22d3ee;
      --color-success: #10b981;
      --color-warning: #f59e0b;
      --color-danger: #ef4444;
      --color-text: #f1f5f9;
      --color-text-secondary: #94a3b8;
      --color-text-muted: #64748b;
      --color-border: #334155;
      --color-border-light: #475569;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --spacing-xs: 0.25rem;
      --spacing-sm: 0.5rem;
      --spacing-md: 1rem;
      --spacing-lg: 1.5rem;
      --spacing-xl: 2rem;
      --spacing-2xl: 3rem;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
      --transition-fast: 150ms ease;
      --transition-base: 250ms ease;
      --transition-slow: 400ms ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body { font-family: var(--font-body); background: var(--color-bg); color: var(--color-text); line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    img { max-width: 100%; height: auto; display: block; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input, textarea, select { font-family: inherit; font-size: inherit; }

    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .main-content { flex: 1; display: flex; padding-top: 70px; }
    .main-content.with-sidebar { padding-left: 0; }
    .content-area { flex: 1; overflow-x: hidden; }

    .navigation { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: linear-gradient(180deg, var(--color-bg-secondary) 0%, rgba(26, 35, 50, 0.95) 100%); backdrop-filter: blur(12px); border-bottom: 1px solid var(--color-border); display: flex; align-items: center; justify-content: space-between; padding: 0 var(--spacing-xl); z-index: 1000; }
    .nav-brand { display: flex; align-items: center; gap: var(--spacing-sm); font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--color-primary); }
    .nav-links { display: flex; align-items: center; gap: var(--spacing-sm); }
    .nav-link { display: flex; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-sm) var(--spacing-md); border-radius: var(--radius-md); font-weight: 500; color: var(--color-text-secondary); transition: all var(--transition-fast); position: relative; }
    .nav-link:hover { color: var(--color-text); background: var(--color-bg-hover); }
    .nav-link.active { color: var(--color-primary); background: rgba(249, 115, 22, 0.1); }
    .nav-link.admin { color: var(--color-accent); }
    .nav-link.admin.active { background: rgba(6, 182, 212, 0.1); }
    .nav-divider { width: 1px; height: 24px; background: var(--color-border); margin: 0 var(--spacing-sm); }
    .cart-badge { position: absolute; top: -4px; right: -4px; background: var(--color-primary); color: white; font-size: 0.7rem; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; }

    .admin-sidebar { width: 260px; min-height: calc(100vh - 70px); background: var(--color-bg-secondary); border-right: 1px solid var(--color-border); padding: var(--spacing-lg); display: flex; flex-direction: column; position: sticky; top: 70px; }
    .sidebar-header { display: flex; align-items: center; gap: var(--spacing-sm); font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; color: var(--color-accent); padding-bottom: var(--spacing-lg); border-bottom: 1px solid var(--color-border); margin-bottom: var(--spacing-lg); }
    .sidebar-nav { display: flex; flex-direction: column; gap: var(--spacing-xs); flex: 1; }
    .sidebar-link { display: flex; align-items: center; gap: var(--spacing-md); padding: var(--spacing-md); border-radius: var(--radius-md); font-weight: 500; color: var(--color-text-secondary); transition: all var(--transition-fast); }
    .sidebar-link:hover { color: var(--color-text); background: var(--color-bg-hover); }
    .sidebar-link.active { color: var(--color-accent); background: rgba(6, 182, 212, 0.1); }
    .pending-badge { margin-left: auto; background: var(--color-danger); color: white; font-size: 0.75rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .sidebar-back { display: flex; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-md); color: var(--color-text-muted); border-top: 1px solid var(--color-border); margin-top: var(--spacing-lg); transition: color var(--transition-fast); }
    .sidebar-back:hover { color: var(--color-text); }
    .sidebar-logout { display: flex; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-md); color: var(--color-danger); border-top: 1px solid var(--color-border); margin-top: var(--spacing-sm); transition: all var(--transition-fast); }
    .sidebar-logout:hover { background: rgba(239, 68, 68, 0.1); }

    .catalog-view { padding: var(--spacing-xl); max-width: 1400px; margin: 0 auto; }
    .catalog-header { margin-bottom: var(--spacing-xl); }
    .catalog-header h1 { font-family: var(--font-display); font-size: 2.5rem; font-weight: 700; margin-bottom: var(--spacing-sm); background: linear-gradient(135deg, var(--color-text) 0%, var(--color-text-secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .catalog-header p { color: var(--color-text-secondary); font-size: 1.1rem; }
    .catalog-filters { display: flex; flex-wrap: wrap; gap: var(--spacing-md); margin-bottom: var(--spacing-xl); align-items: center; }
    .search-box { display: flex; align-items: center; gap: var(--spacing-sm); background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--spacing-sm) var(--spacing-md); flex: 1; min-width: 250px; max-width: 400px; }
    .search-box svg { color: var(--color-text-muted); }
    .search-box input { flex: 1; background: none; border: none; color: var(--color-text); outline: none; }
    .search-box input::placeholder { color: var(--color-text-muted); }
    .category-filters { display: flex; flex-wrap: wrap; gap: var(--spacing-sm); }
    .category-btn { padding: var(--spacing-sm) var(--spacing-md); border-radius: var(--radius-md); font-weight: 500; font-size: 0.9rem; color: var(--color-text-secondary); background: var(--color-bg-secondary); border: 1px solid var(--color-border); transition: all var(--transition-fast); }
    .category-btn:hover { border-color: var(--color-border-light); color: var(--color-text); }
    .category-btn.active { background: var(--color-primary); border-color: var(--color-primary); color: white; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--spacing-lg); }

    .product-card { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; transition: all var(--transition-base); }
    .product-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--color-border-light); }
    .product-image { position: relative; height: 180px; background: var(--color-bg-tertiary); overflow: hidden; }
    .product-image img { width: 100%; height: 100%; object-fit: cover; transition: transform var(--transition-slow); }
    .product-card:hover .product-image img { transform: scale(1.05); }
    .product-category { position: absolute; top: var(--spacing-sm); left: var(--spacing-sm); padding: 4px 10px; border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 600; color: white; text-transform: uppercase; letter-spacing: 0.5px; }
    .stock-indicator { position: absolute; top: var(--spacing-sm); right: var(--spacing-sm); display: flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 600; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); }
    .stock-dot { width: 8px; height: 8px; border-radius: 50%; }
    .stock-dot.available { background: var(--color-success); box-shadow: 0 0 8px var(--color-success); }
    .stock-dot.unavailable { background: var(--color-danger); box-shadow: 0 0 8px var(--color-danger); }
    .product-info { padding: var(--spacing-md); }
    .product-name { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; margin-bottom: var(--spacing-xs); }
    .product-description { font-size: 0.9rem; color: var(--color-text-secondary); margin-bottom: var(--spacing-md); }
    .product-stock { display: flex; align-items: center; justify-content: space-between; padding-top: var(--spacing-md); border-top: 1px solid var(--color-border); }
    .stock-info { font-size: 0.85rem; color: var(--color-text-muted); }
    .stock-info strong { color: var(--color-text); font-weight: 600; }
    .add-to-cart-btn { display: flex; align-items: center; gap: var(--spacing-xs); padding: var(--spacing-sm) var(--spacing-md); background: var(--color-primary); color: white; border-radius: var(--radius-md); font-weight: 600; font-size: 0.9rem; transition: all var(--transition-fast); }
    .add-to-cart-btn:hover { background: var(--color-primary-dark); }
    .add-to-cart-btn:disabled { background: var(--color-text-muted); cursor: not-allowed; }

    .cart-view { padding: var(--spacing-xl); max-width: 1000px; margin: 0 auto; }
    .cart-header { display: flex; align-items: center; gap: var(--spacing-md); margin-bottom: var(--spacing-xl); }
    .cart-header h1 { font-family: var(--font-display); font-size: 2rem; font-weight: 700; }
    .back-link { display: flex; align-items: center; gap: var(--spacing-xs); color: var(--color-text-secondary); font-weight: 500; transition: color var(--transition-fast); }
    .back-link:hover { color: var(--color-primary); }
    .cart-empty { text-align: center; padding: var(--spacing-2xl); color: var(--color-text-secondary); }
    .cart-empty svg { width: 64px; height: 64px; margin: 0 auto var(--spacing-lg); opacity: 0.5; }
    .cart-section { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--spacing-lg); margin-bottom: var(--spacing-lg); }
    .cart-section-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; margin-bottom: var(--spacing-md); display: flex; align-items: center; gap: var(--spacing-sm); }
    .cart-item { display: flex; align-items: center; gap: var(--spacing-md); padding: var(--spacing-md) 0; border-bottom: 1px solid var(--color-border); }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-image { width: 60px; height: 60px; border-radius: var(--radius-md); overflow: hidden; flex-shrink: 0; }
    .cart-item-image img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-weight: 600; margin-bottom: 2px; }
    .cart-item-category { font-size: 0.85rem; color: var(--color-text-secondary); }
    .quantity-control { display: flex; align-items: center; gap: var(--spacing-sm); }
    .quantity-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--color-bg-tertiary); border: 1px solid var(--color-border); border-radius: var(--radius-sm); transition: all var(--transition-fast); }
    .quantity-btn:hover { background: var(--color-bg-hover); border-color: var(--color-border-light); }
    .quantity-value { width: 40px; text-align: center; font-weight: 600; }
    .remove-btn { color: var(--color-danger); padding: var(--spacing-sm); transition: opacity var(--transition-fast); }
    .remove-btn:hover { opacity: 0.7; }
    .date-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-md); }
    .form-group { display: flex; flex-direction: column; gap: var(--spacing-xs); }
    .form-group label { font-size: 0.9rem; font-weight: 500; color: var(--color-text-secondary); }
    .form-group input, .form-group textarea, .form-group select { padding: var(--spacing-sm) var(--spacing-md); background: var(--color-bg-tertiary); border: 1px solid var(--color-border); border-radius: var(--radius-md); color: var(--color-text); outline: none; transition: border-color var(--transition-fast); }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--color-primary); }
    .availability-warning { display: flex; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-md); background: rgba(239, 68, 68, 0.1); border: 1px solid var(--color-danger); border-radius: var(--radius-md); color: var(--color-danger); font-size: 0.9rem; margin-top: var(--spacing-md); }
    .personal-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-md); }
    .personal-info-grid .form-group.full-width { grid-column: 1 / -1; }
    .submit-btn { width: 100%; padding: var(--spacing-md) var(--spacing-lg); background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%); color: white; border-radius: var(--radius-md); font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; transition: all var(--transition-fast); margin-top: var(--spacing-md); }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(249, 115, 22, 0.3); }
    .submit-btn:disabled { background: var(--color-text-muted); cursor: not-allowed; transform: none; box-shadow: none; }

    .admin-view { padding: var(--spacing-xl); }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--spacing-xl); flex-wrap: wrap; gap: var(--spacing-md); }
    .admin-header h1 { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; color: var(--color-accent); }
    .admin-table { width: 100%; background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; }
    .admin-table th, .admin-table td { padding: var(--spacing-md); text-align: left; border-bottom: 1px solid var(--color-border); }
    .admin-table th { background: var(--color-bg-tertiary); font-weight: 600; color: var(--color-text-secondary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--color-bg-hover); }
    .table-product { display: flex; align-items: center; gap: var(--spacing-md); }
    .table-product-image { width: 50px; height: 50px; border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0; }
    .table-product-image img { width: 100%; height: 100%; object-fit: cover; }
    .table-category { display: inline-block; padding: 2px 8px; border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 600; color: white; }
    .table-borrowers { font-size: 0.85rem; }
    .table-borrower { padding: 4px 0; border-bottom: 1px dashed var(--color-border); }
    .table-borrower:last-child { border-bottom: none; }
    .table-actions { display: flex; gap: var(--spacing-xs); }
    .table-action-btn { padding: var(--spacing-xs) var(--spacing-sm); border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 500; transition: all var(--transition-fast); display: flex; align-items: center; gap: 4px; }
    .table-action-btn.edit { background: rgba(6, 182, 212, 0.1); color: var(--color-accent); }
    .table-action-btn.edit:hover { background: rgba(6, 182, 212, 0.2); }
    .table-action-btn.delete { background: rgba(239, 68, 68, 0.1); color: var(--color-danger); }
    .table-action-btn.delete:hover { background: rgba(239, 68, 68, 0.2); }

    .calendar-view { overflow-x: auto; }
    .calendar-nav { display: flex; align-items: center; gap: var(--spacing-md); margin-bottom: var(--spacing-lg); }
    .calendar-nav-btn { padding: var(--spacing-sm) var(--spacing-md); background: var(--color-bg-tertiary); border: 1px solid var(--color-border); border-radius: var(--radius-md); color: var(--color-text); display: flex; align-items: center; gap: var(--spacing-xs); transition: all var(--transition-fast); }
    .calendar-nav-btn:hover { background: var(--color-bg-hover); border-color: var(--color-border-light); }
    .calendar-period { font-family: var(--font-display); font-weight: 600; color: var(--color-text-secondary); }
    .calendar-grid { display: grid; grid-template-columns: 200px repeat(14, minmax(80px, 1fr)); gap: 1px; background: var(--color-border); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; }
    .calendar-header-cell { background: var(--color-bg-tertiary); padding: var(--spacing-sm); text-align: center; font-size: 0.8rem; }
    .calendar-header-cell.product-col { text-align: left; font-weight: 600; }
    .calendar-header-cell .day-name { color: var(--color-text-muted); }
    .calendar-header-cell .day-num { font-weight: 600; color: var(--color-text); }
    .calendar-row { display: contents; }
    .calendar-product-cell { background: var(--color-bg-card); padding: var(--spacing-sm); display: flex; align-items: center; gap: var(--spacing-sm); }
    .calendar-product-cell img { width: 32px; height: 32px; border-radius: var(--radius-sm); object-fit: cover; }
    .calendar-product-name { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .calendar-day-cell { background: var(--color-bg-card); padding: 4px; min-height: 50px; position: relative; }
    .calendar-loan { padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .calendar-loan.active { background: rgba(249, 115, 22, 0.2); color: var(--color-primary); border-left: 2px solid var(--color-primary); }
    .calendar-loan.pending { background: rgba(6, 182, 212, 0.2); color: var(--color-accent); border-left: 2px solid var(--color-accent); }

    .requests-list { display: flex; flex-direction: column; gap: var(--spacing-md); }
    .request-card { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--spacing-lg); display: grid; grid-template-columns: 1fr auto; gap: var(--spacing-lg); align-items: start; }
    .request-info h3 { font-family: var(--font-display); font-size: 1.1rem; margin-bottom: var(--spacing-sm); }
    .request-details { display: flex; flex-wrap: wrap; gap: var(--spacing-md); font-size: 0.9rem; color: var(--color-text-secondary); }
    .request-detail { display: flex; align-items: center; gap: var(--spacing-xs); }
    .request-notes { margin-top: var(--spacing-sm); padding: var(--spacing-sm); background: var(--color-bg-tertiary); border-radius: var(--radius-sm); font-size: 0.85rem; font-style: italic; color: var(--color-text-secondary); }
    .request-actions { display: flex; flex-direction: column; gap: var(--spacing-sm); }
    .btn-approve, .btn-reject { display: flex; align-items: center; gap: var(--spacing-xs); padding: var(--spacing-sm) var(--spacing-md); border-radius: var(--radius-md); font-weight: 600; font-size: 0.9rem; transition: all var(--transition-fast); }
    .btn-approve { background: var(--color-success); color: white; }
    .btn-approve:hover { background: #059669; }
    .btn-reject { background: var(--color-bg-tertiary); color: var(--color-danger); border: 1px solid var(--color-danger); }
    .btn-reject:hover { background: rgba(239, 68, 68, 0.1); }

    .empty-state { text-align: center; padding: var(--spacing-2xl); color: var(--color-text-secondary); }
    .empty-state svg { width: 64px; height: 64px; margin: 0 auto var(--spacing-lg); opacity: 0.5; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: var(--spacing-lg); animation: fadeIn var(--transition-fast); }
    .modal { background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: var(--radius-xl); max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; animation: modalIn var(--transition-base); }
    .modal-header { padding: var(--spacing-lg); border-bottom: 1px solid var(--color-border); display: flex; align-items: center; justify-content: space-between; }
    .modal-header h2 { font-family: var(--font-display); font-size: 1.3rem; font-weight: 600; }
    .modal-close { padding: var(--spacing-xs); color: var(--color-text-muted); transition: color var(--transition-fast); }
    .modal-close:hover { color: var(--color-text); }
    .modal-body { padding: var(--spacing-lg); }
    .modal-footer { padding: var(--spacing-lg); border-top: 1px solid var(--color-border); display: flex; gap: var(--spacing-md); justify-content: flex-end; }
    .modal-btn { padding: var(--spacing-sm) var(--spacing-lg); border-radius: var(--radius-md); font-weight: 600; transition: all var(--transition-fast); }
    .modal-btn.primary { background: var(--color-primary); color: white; }
    .modal-btn.primary:hover { background: var(--color-primary-dark); }
    .modal-btn.secondary { background: var(--color-bg-tertiary); color: var(--color-text); border: 1px solid var(--color-border); }
    .modal-btn.secondary:hover { background: var(--color-bg-hover); }
    .modal-btn.danger { background: var(--color-danger); color: white; }
    .modal-btn.danger:hover { background: #dc2626; }

    .toast { position: fixed; bottom: var(--spacing-xl); right: var(--spacing-xl); padding: var(--spacing-md) var(--spacing-lg); background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-md); box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: var(--spacing-md); animation: toastIn var(--transition-base); z-index: 3000; }
    .toast.success { border-left: 4px solid var(--color-success); }
    .toast.error { border-left: 4px solid var(--color-danger); }
    .toast-close { color: var(--color-text-muted); padding: var(--spacing-xs); }

    .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--spacing-xl); background: linear-gradient(135deg, var(--color-bg) 0%, var(--color-bg-secondary) 100%); }

        <div className="modal-overlay" onClick={onClose}>

    // Product Card

    // Catalog View
    const CatalogView = ({ products, loans, cart, onAddToCart, categories }) => {
      const [search, setSearch] = useState('');
      const [selectedCategory, setSelectedCategory] = useState('Tous');
      const allCategories = ['Tous', ...categories];

      const getAvailableStock = (product) => {
        const borrowed = loans.filter(l => l.productId === product.id && (l.status === 'active' || l.status === 'pending'))
          .reduce((sum, l) => sum + l.quantity, 0);
        const inCart = cart.find(c => c.product.id === product.id)?.quantity || 0;
        return product.totalStock - borrowed - inCart;
      };

      const filteredProducts = products.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(search.toLowerCase());
        const matchesCategory = selectedCategory === 'Tous' || p.category === selectedCategory;
        return matchesSearch && matchesCategory;
      });

      return (
        <div className="catalog-view">
          <div className="catalog-header">
            <h1>Catalogue de matériel</h1>
            <p>Parcourez notre sélection d'équipements disponibles à l'emprunt</p>

            <div className="search-box">
              <Icon name="search" size={18} />
              <input type="text" placeholder="Rechercher un produit..." value={search} onChange={(e) => setSearch(e.target.value)} />

            <div className="category-filters">

          </div>
        </div>
      );

    // Cart View
    const CartView = ({ cart, products, loans, updateCartItem, removeFromCart, onSubmitRequest }) => {
      const [pickupDate, setPickupDate] = useState('');
      const [returnDate, setReturnDate] = useState('');
      const [formData, setFormData] = useState({ firstName: '', lastName: '', email: '', phone: '', organization: '', notes: '' });
      const [showConfirm, setShowConfirm] = useState(false);

      const checkAvailability = (productId, quantity) => {
        if (!pickupDate || !returnDate) return true;
        const overlappingLoans = loans.filter(l => 
          l.productId === productId && 
          (l.status === 'active' || l.status === 'pending') &&
          !(returnDate < l.pickupDate || pickupDate > l.returnDate)
        );
        const borrowed = overlappingLoans.reduce((sum, l) => sum + l.quantity, 0);
        const product = products.find(p => p.id === productId);
        return product && (product.totalStock - borrowed >= quantity);
      };

      const allAvailable = cart.every(item => checkAvailability(item.product.id, item.quantity));
      const canSubmit = cart.length > 0 && pickupDate && returnDate && formData.firstName && formData.lastName && formData.email && allAvailable;

      const handleSubmit = () => {
        if (canSubmit) setShowConfirm(true);
      };

      const confirmSubmit = () => {
        onSubmitRequest({ ...formData, pickupDate, returnDate, items: cart });
        setShowConfirm(false);
      };

      if (cart.length === 0) {
        return (
          <div className="cart-view">
            <div className="cart-empty">
              <Icon name="cart" size={64} />
              <h2>Votre panier est vide</h2>
              <p>Ajoutez des produits depuis le catalogue</p>
            </div>
          </div>
        );
      }

      return (
        <div className="cart-view">
          <div className="cart-header">
            <h1>Votre panier</h1>
          </div>

            <h3 className="cart-section-title"><Icon name="box" size={18} />Produits sélectionnés</h3>
            {cart.map(item => (

                <div className="cart-item-image"><img src={item.product.image} alt={item.product.name} /></div>
                <div className="cart-item-info">
                  <div className="cart-item-name">{item.product.name}</div>
                  <div className="cart-item-category">{item.product.category}</div>
                </div>
                <div className="quantity-control">
                  <button className="quantity-btn" onClick={() => updateCartItem(item.product.id, item.quantity - 1)}><Icon name="minus" size={16} /></button>
                  <span className="quantity-value">{item.quantity}</span>
                  <button className="quantity-btn" onClick={() => updateCartItem(item.product.id, item.quantity + 1)}><Icon name="plus" size={16} /></button>
                </div>
                <button className="remove-btn" onClick={() => removeFromCart(item.product.id)}><Icon name="trash" size={18} /></button>
              </div>
            ))}
          </div>
          <div className="cart-section">
            <h3 className="cart-section-title"><Icon name="calendar" size={18} />Dates d'emprunt</h3>
            <div className="date-inputs">
              <div className="form-group">
                <label>Date de retrait</label>
                <input type="date" value={pickupDate} onChange={(e) => setPickupDate(e.target.value)} min={new Date().toISOString().split('T')[0]} />
              </div>
              <div className="form-group">
                <label>Date de retour</label>
                <input type="date" value={returnDate} onChange={(e) => setReturnDate(e.target.value)} min={pickupDate || new Date().toISOString().split('T')[0]} />
              </div>
            </div>
            {pickupDate && returnDate && !allAvailable && (
              <div className="availability-warning">
                <Icon name="x" size={18} />
                Certains produits ne sont pas disponibles aux dates sélectionnées
              </div>
            )}
          </div>
          <div className="cart-section">
            <h3 className="cart-section-title"><Icon name="user" size={18} />Informations personnelles</h3>
            <div className="personal-info-grid">
              <div className="form-group">
                <label>Prénom *</label>
                <input type="text" value={formData.firstName} onChange={(e) => setFormData({...formData, firstName: e.target.value})} />
              </div>
              <div className="form-group">
                <label>Nom *</label>
                <input type="text" value={formData.lastName} onChange={(e) => setFormData({...formData, lastName: e.target.value})} />
              </div>
              <div className="form-group">
                <label>Email *</label>
                <input type="email" value={formData.email} onChange={(e) => setFormData({...formData, email: e.target.value})} />
              </div>
              <div className="form-group">
                <label>Téléphone</label>
                <input type="tel" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} />
              </div>
              <div className="form-group full-width">
                <label>Organisation</label>
                <input type="text" value={formData.organization} onChange={(e) => setFormData({...formData, organization: e.target.value})} />
              </div>
              <div className="form-group full-width">
                <label>Notes</label>
                <textarea value={formData.notes} onChange={(e) => setFormData({...formData, notes: e.target.value})} rows="3" placeholder="Informations complémentaires..." />
              </div>
            </div>
          </div>
          <button className="submit-btn" onClick={handleSubmit} disabled={!canSubmit}>Envoyer la demande</button>
          
          {showConfirm && (
            <div className="modal-overlay" onClick={() => setShowConfirm(false)}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <div className="modal-header">
                  <h2>Confirmer la demande</h2>
                  <button className="modal-close" onClick={() => setShowConfirm(false)}><Icon name="x" /></button>
                </div>
                <div className="modal-body">
                  <p><strong>Produits:</strong></p>
                  <ul style={{ marginLeft: '1rem', marginBottom: '1rem' }}>
                    {cart.map(item => <li key={item.product.id}>{item.product.name} x{item.quantity}</li>)}
                  </ul>
                  <p><strong>Dates:</strong> {formatDate(pickupDate)} → {formatDate(returnDate)}</p>
                  <p><strong>Demandeur:</strong> {formData.firstName} {formData.lastName}</p>
                </div>
                <div className="modal-footer">
                  <button className="modal-btn secondary" onClick={() => setShowConfirm(false)}>Annuler</button>
                  <button className="modal-btn primary" onClick={confirmSubmit}>Confirmer</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // Admin Products View
    const AdminProductsView = ({ products, loans, categories, onAddProduct, onEditProduct, onDeleteProduct, onManageCategories }) => {
      const [showProductForm, setShowProductForm] = useState(false);
      const [editingProduct, setEditingProduct] = useState(null);
      const [showCategoryManager, setShowCategoryManager] = useState(false);
      const [deleteProduct, setDeleteProduct] = useState(null);

      const getActiveLoans = (productId) => loans.filter(l => l.productId === productId && l.status === 'active');

      const handleSaveProduct = (productData) => {
        if (editingProduct) {
          onEditProduct({ ...productData, id: editingProduct.id });
        } else {
          onAddProduct(productData);
        }
        setShowProductForm(false);
        setEditingProduct(null);
      };

      const handleEditClick = (product) => {
        setEditingProduct(product);
        setShowProductForm(true);
      };

      const handleDeleteConfirm = () => {
        onDeleteProduct(deleteProduct.id);
        setDeleteProduct(null);
      };

      return (
        <div className="admin-view">
          <div className="admin-header">
            <h1>Gestion des produits</h1>
            <div style={{ display: 'flex', gap: '0.5rem' }}>

                <Icon name="list" size={18} />

          <table className="admin-table">
            <thead>
              <tr>
                <th>Produit</th>
                <th>Catégorie</th>
                <th>Stock</th>
                <th>Emprunts actifs</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {products.map(product => {
                const activeLoans = getActiveLoans(product.id);
                const borrowed = activeLoans.reduce((sum, l) => sum + l.quantity, 0);
                return (
                  <tr key={product.id}>
                    <td>
                      <div className="table-product">
                        <div className="table-product-image"><img src={product.image || 'https://via.placeholder.com/50?text=?'} alt={product.name} /></div>
                        <div>
                          <div style={{ fontWeight: 600 }}>{product.name}</div>
                          <div style={{ fontSize: '0.8rem', color: 'var(--color-text-muted)' }}>{product.description}</div>
                        </div>
                      </div>
                    </td>
                    <td><span className="table-category" style={{ background: getCategoryColor(product.category) }}>{product.category}</span></td>
                    <td><strong>{product.totalStock - borrowed}</strong> / {product.totalStock}</td>
                    <td>
                      {activeLoans.length > 0 ? (
                        <div className="table-borrowers">
                          {activeLoans.map(loan => (
                            <div key={loan.id} className="table-borrower">
                              {loan.borrowerName} ({loan.quantity}x)
                              <br />
                              <small style={{ color: 'var(--color-text-muted)' }}>{formatDateShort(loan.pickupDate)} → {formatDateShort(loan.returnDate)}</small>
                            </div>
                          ))}
                        </div>
                      ) : <span style={{ color: 'var(--color-text-muted)' }}>Aucun</span>}
                    </td>
                    <td>
                      <div className="table-actions">
                        <button className="table-action-btn edit" onClick={() => handleEditClick(product)}>
                          <Icon name="edit" size={14} />
                          Modifier
                        </button>

                          <Icon name="trash" size={14} />
                          Supprimer

                );
              })}
            </tbody>
          </table>

          {showProductForm && (
            <ProductFormModal 
              product={editingProduct} 
              categories={categories}
              onSave={handleSaveProduct} 
              onClose={() => { setShowProductForm(false); setEditingProduct(null); }} 
            />
          )}

          {showCategoryManager && (
            <CategoryManagerModal 
              categories={categories}
              onSave={(cats) => { onManageCategories(cats); setShowCategoryManager(false); }}
              onClose={() => setShowCategoryManager(false)}
            />
          )}

          {deleteProduct && (
            <DeleteConfirmModal 
              productName={deleteProduct.name}
              onConfirm={handleDeleteConfirm}
              onClose={() => setDeleteProduct(null)}
            />
          )}
        </div>
      );
    };

    // Admin Calendar View
    const AdminCalendarView = ({ products, loans }) => {
      const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
      const dates = getDateRange(startDate, 14);

      const navigateWeek = (direction) => {
        const current = new Date(startDate);
        current.setDate(current.getDate() + (direction * 7));
        setStartDate(current.toISOString().split('T')[0]);
      };

      const getLoansForProductOnDate = (productId, date) => {
        return loans.filter(l => 
          l.productId === productId && 
          l.status !== 'rejected' &&
          isDateInRange(date, l.pickupDate, l.returnDate)
        );
      };

      return (
        <div className="admin-view">
          <div className="admin-header">
            <h1>Calendrier des emprunts</h1>
          </div>
          <div className="calendar-nav">
            <button className="calendar-nav-btn" onClick={() => navigateWeek(-1)}><Icon name="chevronLeft" size={18} />Semaine préc.</button>
            <span className="calendar-period">{formatDateShort(dates[0])} - {formatDateShort(dates[13])}</span>
            <button className="calendar-nav-btn" onClick={() => navigateWeek(1)}>Semaine suiv.<Icon name="chevronRight" size={18} /></button>
          </div>
          <div className="calendar-view">
            <div className="calendar-grid">
              <div className="calendar-header-cell product-col">Produit</div>
              {dates.map(date => (
                <div key={date} className="calendar-header-cell">
                  <div className="day-name">{new Date(date).toLocaleDateString('fr-FR', { weekday: 'short' })}</div>
                  <div className="day-num">{new Date(date).getDate()}</div>
                </div>
              ))}
              {products.map(product => (
                <div key={product.id} className="calendar-row">
                  <div className="calendar-product-cell">
                    <img src={product.image || 'https://via.placeholder.com/32?text=?'} alt={product.name} />
                    <span className="calendar-product-name">{product.name}</span>
                  </div>
                  {dates.map(date => {
                    const dayLoans = getLoansForProductOnDate(product.id, date);
                    return (
                      <div key={date} className="calendar-day-cell">
                        {dayLoans.map(loan => (
                          <div key={loan.id} className={`calendar-loan ${loan.status}`} title={`${loan.borrowerName} (${loan.quantity}x)`}>
                            {loan.borrowerName.split(' ')[0]} ({loan.quantity})
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // Admin Requests View
    const AdminRequestsView = ({ loans, products, onUpdateLoanStatus }) => {
      const pendingLoans = loans.filter(l => l.status === 'pending');

      if (pendingLoans.length === 0) {
        return (
          <div className="admin-view">
            <div className="admin-header"><h1>Demandes en attente</h1></div>
            <div className="empty-state">
              <Icon name="inbox" size={64} />
              <h2>Aucune demande en attente</h2>
              <p>Les nouvelles demandes apparaîtront ici</p>
            </div>
          </div>
        );
      }

      return (
        <div className="admin-view">
          <div className="admin-header"><h1>Demandes en attente ({pendingLoans.length})</h1></div>
          <div className="requests-list">
            {pendingLoans.map(loan => {
              const product = products.find(p => p.id === loan.productId);
              return (
                <div key={loan.id} className="request-card">
                  <div className="request-info">
                    <h3>{product?.name || 'Produit inconnu'} × {loan.quantity}</h3>
                    <div className="request-details">
                      <span className="request-detail"><Icon name="user" size={16} />{loan.borrowerName}</span>
                      <span className="request-detail"><Icon name="mail" size={16} />{loan.borrowerEmail}</span>
                      {loan.borrowerPhone && <span className="request-detail"><Icon name="phone" size={16} />{loan.borrowerPhone}</span>}
                      <span className="request-detail"><Icon name="calendar" size={16} />{formatDate(loan.pickupDate)} → {formatDate(loan.returnDate)}</span>
                    </div>
                    {loan.notes && <div className="request-notes">"{loan.notes}"</div>}
                  </div>
                  <div className="request-actions">
                    <button className="btn-approve" onClick={() => onUpdateLoanStatus(loan.id, 'active')}><Icon name="check" size={18} />Approuver</button>
                    <button className="btn-reject" onClick={() => onUpdateLoanStatus(loan.id, 'rejected')}><Icon name="x" size={18} />Refuser</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    // Main App
    function App() {
      const [view, setView] = useState('catalog');
      const [products, setProducts] = useState(initialProducts);
      const [categories, setCategories] = useState(initialCategories);
      const [loans, setLoans] = useState(initialLoans);
      const [cart, setCart] = useState([]);
      const [toast, setToast] = useState(null);
      const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);

      const pendingCount = loans.filter(l => l.status === 'pending').length;
      const showToast = (message, type = 'success') => setToast({ message, type });

      const handleLogin = () => {
        setIsAdminLoggedIn(true);
        setView('admin-products');
        showToast('Connexion réussie');
      };

      const handleLogout = () => {
        setIsAdminLoggedIn(false);
        setView('catalog');
        showToast('Déconnexion réussie');
      };

      const addToCart = (product, quantity) => {
        const existingIndex = cart.findIndex(c => c.product.id === product.id);
        if (existingIndex >= 0) {
          const newCart = [...cart];
          newCart[existingIndex].quantity += quantity;
          setCart(newCart);
        } else {
          setCart([...cart, { product, quantity }]);
        }
        showToast(`${product.name} ajouté au panier`);
      };

      const updateCartItem = (productId, quantity) => {
        if (quantity <= 0) removeFromCart(productId);
        else setCart(cart.map(item => item.product.id === productId ? { ...item, quantity } : item));
      };

      const removeFromCart = (productId) => setCart(cart.filter(c => c.product.id !== productId));

      const submitRequest = (requestData) => {
        const newLoans = requestData.items.map((item, index) => ({
          id: Date.now() + index,
          productId: item.product.id,
          quantity: item.quantity,
          borrowerName: `${requestData.firstName} ${requestData.lastName}`,
          borrowerEmail: requestData.email,
          borrowerPhone: requestData.phone,
          pickupDate: requestData.pickupDate,
          returnDate: requestData.returnDate,
          status: 'pending',
          notes: requestData.notes
        }));
        setLoans([...loans, ...newLoans]);
        setCart([]);
        setView('catalog');
        showToast('Demande envoyée avec succès ! Un email de confirmation a été envoyé.');
      };

      const updateLoanStatus = (loanId, status) => {
        setLoans(loans.map(loan => loan.id === loanId ? { ...loan, status } : loan));
        showToast(status === 'active' ? 'Demande approuvée' : 'Demande refusée');
      };

      // Product CRUD
      const addProduct = (productData) => {
        const newProduct = { ...productData, id: Date.now() };
        setProducts([...products, newProduct]);
        showToast(`Produit "${productData.name}" ajouté`);
      };

      const editProduct = (productData) => {
        setProducts(products.map(p => p.id === productData.id ? productData : p));
        showToast(`Produit "${productData.name}" modifié`);
      };

      const deleteProduct = (productId) => {
        const product = products.find(p => p.id === productId);
        setProducts(products.filter(p => p.id !== productId));
        showToast(`Produit "${product?.name}" supprimé`);
      };

      const manageCategories = (newCategories) => {
        setCategories(newCategories);
        showToast('Catégories mises à jour');
      };

      // Handle view changes - require login for admin
      const handleSetView = (newView) => {
        if (newView.startsWith('admin') && !isAdminLoggedIn) {
          setView('login');
        } else {
          setView(newView);
        }
      };

      // Login view
      if (view === 'login') {
        return <LoginView onLogin={handleLogin} onBack={() => setView('catalog')} />;
      }

      return (
        <div className="app">
          <Navigation view={view} setView={handleSetView} cartCount={cart.length} isAdminLoggedIn={isAdminLoggedIn} />
          <main className={`main-content ${view.startsWith('admin') ? 'with-sidebar' : ''}`}>
            {view.startsWith('admin') && <AdminSidebar view={view} setView={setView} pendingCount={pendingCount} onLogout={handleLogout} />}
            <div className="content-area">
              {view === 'catalog' && <CatalogView products={products} loans={loans} cart={cart} onAddToCart={addToCart} categories={categories} />}
              {view === 'cart' && <CartView cart={cart} products={products} loans={loans} updateCartItem={updateCartItem} removeFromCart={removeFromCart} onSubmitRequest={submitRequest} />}
              {view === 'admin-products' && <AdminProductsView products={products} loans={loans} categories={categories} onAddProduct={addProduct} onEditProduct={editProduct} onDeleteProduct={deleteProduct} onManageCategories={manageCategories} />}
              {view === 'admin-calendar' && <AdminCalendarView products={products} loans={loans} />}
              {view === 'admin-requests' && <AdminRequestsView loans={loans} products={products} onUpdateLoanStatus={updateLoanStatus} />}
            </div>
          </main>
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
